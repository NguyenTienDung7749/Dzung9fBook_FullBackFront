<header class="site-header" data-header>
  <div class="header-top">
    <div class="container header-top__inner">
      <a href="./index.html" class="brand" aria-label="Dzung9fBook trang chu">
        <span class="brand__mark">B</span>
        <span class="brand__text">Dzung9fBook</span>
      </a>

      <form action="./books.html" method="get" class="header-search" data-header-search-form>
        <label class="search-field">
          <span class="sr-only">Tìm kiếm sách</span>
          <input type="search" name="q" placeholder="Tìm theo tên sách hoặc tác giả" data-search-input inputmode="search">
        </label>
        <button class="btn btn-primary" type="submit">Tìm kiếm</button>
      </form>

      <div class="header-toolbar">
        <div class="header-auth" aria-label="Truy cập tài khoản">
          <a href="./login.html" class="header-auth__link" data-auth-link data-page-target="login" data-auth-guest>Đăng nhập</a>
          <a href="./register.html" class="header-auth__link header-auth__link--primary" data-auth-link data-page-target="register" data-auth-guest>Đăng ký</a>
          <a href="./profile.html" class="header-auth__link" data-auth-link data-page-target="profile" data-auth-user hidden>Hồ sơ</a>
          <button class="header-auth__link header-auth__link--primary" type="button" data-auth-user data-logout-button hidden>Đăng xuất</button>
        </div>

        <div class="header-actions">
          <a href="./cart.html" class="header-icon" aria-label="Giỏ hàng">
            <ion-icon name="bag-handle-outline" aria-hidden="true"></ion-icon>
            <span class="cart-badge" data-cart-count>0</span>
          </a>

          <a href="./profile.html" class="header-icon" aria-label="Hồ sơ">
            <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
          </a>

          <button class="menu-toggle" type="button" aria-label="Mở menu" data-nav-toggler>
            <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="header-bottom" data-navbar>
    <div class="header-bottom__inner">
      <button class="nav-close-btn" type="button" aria-label="Đóng menu" data-nav-toggler>
        <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
      </button>

      <form action="./books.html" method="get" class="drawer-search">
        <label class="search-field">
          <span class="sr-only">Tìm kiếm sách</span>
          <input type="search" name="q" placeholder="Tìm sách nhanh..." data-search-input inputmode="search">
        </label>
        <button class="btn btn-primary btn-block" type="submit">Tìm kiếm</button>
      </form>

      <div class="drawer-auth">
        <a href="./login.html" class="drawer-auth__link" data-auth-link data-page-target="login" data-close-nav data-auth-guest>Đăng nhập</a>
        <a href="./register.html" class="drawer-auth__link drawer-auth__link--primary" data-auth-link data-page-target="register" data-close-nav data-auth-guest>Đăng ký</a>
        <a href="./profile.html" class="drawer-auth__link" data-auth-link data-page-target="profile" data-close-nav data-auth-user hidden>Hồ sơ</a>
        <button class="drawer-auth__link drawer-auth__link--primary" type="button" data-auth-user data-logout-button hidden>Đăng xuất</button>
      </div>

      <div class="drawer-category-nav" data-mobile-category-nav></div>

      <nav class="main-nav" aria-label="Điều hướng chính">
        <ul class="nav-list">
          <li><a href="./index.html" class="nav-link" data-nav-link data-page-target="home">Trang chủ</a></li>
          <li><a href="./books.html" class="nav-link" data-nav-link data-page-target="books">Sách</a></li>
          <li><a href="./cart.html" class="nav-link" data-nav-link data-page-target="cart">Giỏ hàng</a></li>
          <li><a href="./profile.html" class="nav-link" data-nav-link data-page-target="profile">Hồ sơ</a></li>
          <li><a href="./contact.html" class="nav-link" data-nav-link data-page-target="contact">Liên hệ</a></li>
        </ul>
      </nav>

  <div class="overlay" data-overlay data-nav-toggler></div>
