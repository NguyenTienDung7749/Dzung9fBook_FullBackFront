<main>
  <section class="section">
    <div class="container admin-layout">
      <div class="section-heading section-heading--compact">
        <div>
          <p class="section-label">Admin / Tồn kho</p>
          <h1 class="section-title">Quản lý tồn kho sách</h1>
          <p class="section-text">Khóa inventory về 2 trạng thái thực dụng: còn hàng mặc định 500 hoặc hết hàng = 0.</p>
        </div>

        <div class="empty-state__actions">
          <a href="./admin.html" class="btn btn-secondary">Hub quản trị</a>
          <a href="./admin-orders.html" class="btn btn-secondary">Đơn hàng</a>
          <a href="./admin-messages.html" class="btn btn-secondary">Tin nhắn liên hệ</a>
        </div>
      </div>

      <div class="form-card admin-toolbar">
        <div>
          <p class="profile-card__eyebrow">Bộ lọc</p>
          <h2>Danh sách sách</h2>
          <p>Tìm nhanh theo tên, handle, SKU và đổi trạng thái sold-out ngay trên trang mà không mở rộng thành dashboard lớn.</p>
        </div>

        <div class="admin-toolbar__controls">
          <label class="form-field">
            <span class="label-text">Tìm nhanh sách</span>
            <input type="search" placeholder="Tên sách, handle, SKU, tác giả..." data-admin-books-search inputmode="search" autocomplete="off">
          </label>

          <label class="form-field">
            <span class="label-text">Lọc inventory</span>
            <select data-admin-books-filter>
              <option value="">Tất cả sách</option>
              <option value="in-stock">Còn hàng</option>
              <option value="sold-out">Hết hàng</option>
            </select>
          </label>
        </div>
      </div>

      <div data-admin-books-content></div>
    </div>
  </section>
</main>
