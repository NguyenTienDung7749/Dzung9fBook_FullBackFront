<main>
  <section class="section">
    <div class="container admin-layout">
      <div class="section-heading section-heading--compact">
        <div>
          <p class="section-label">Admin / Lien he</p>
          <h1 class="section-title">Xu ly tin nhan ho tro</h1>
          <p class="section-text">Xem nhanh cac yeu cau lien he moi va cap nhat trang thai xu ly ma khong can dashboard phuc tap.</p>
        </div>

        <div class="empty-state__actions">
          <a href="./admin-books.html" class="btn btn-secondary">Ton kho sach</a>
          <a href="./admin-orders.html" class="btn btn-secondary">Don hang</a>
        </div>
      </div>

      <div class="form-card admin-toolbar">
        <div>
          <p class="profile-card__eyebrow">Bo loc</p>
          <h2>Danh sach lien he</h2>
          <p>Loc theo trang thai de staff/admin nam nhanh yeu cau moi, dang xu ly hoac da chot.</p>
        </div>

        <div class="admin-toolbar__controls">
          <label class="form-field">
            <span class="label-text">Tim nhanh lien he</span>
            <input type="search" placeholder="Ten, email, so dien thoai hoac noi dung" data-admin-messages-search inputmode="search" autocomplete="off">
          </label>

          <label class="form-field">
            <span class="label-text">Trang thai lien he</span>
            <select data-admin-messages-filter>
              <option value="">Tat ca lien he</option>
              <option value="RECEIVED">Moi nhan</option>
              <option value="IN_PROGRESS">Dang xu ly</option>
              <option value="RESOLVED">Da giai quyet</option>
              <option value="CLOSED">Da dong</option>
            </select>
          </label>
        </div>
      </div>

      <div data-admin-messages-content></div>
    </div>
  </section>
</main>
