<main>
  <section class="section">
    <div class="container admin-layout">
      <div class="section-heading section-heading--compact">
        <div>
          <p class="section-label">Admin / Liên hệ</p>
          <h1 class="section-title">Xử lý tin nhắn hỗ trợ</h1>
          <p class="section-text">Xem nhanh yêu cầu mới, đọc nội dung đầy đủ và cập nhật xử lý trong một giao diện thân thiện hơn.</p>
        </div>

        <nav class="admin-subnav" aria-label="Điều hướng quản trị">
          <a href="./admin.html" class="admin-subnav__link">Hub</a>
          <a href="./admin-orders.html" class="admin-subnav__link">Đơn hàng</a>
          <a href="./admin-books.html" class="admin-subnav__link">Tồn kho</a>
          <a href="./admin-messages.html" class="admin-subnav__link is-active" aria-current="page">Tin nhắn</a>
        </nav>
      </div>

      <div class="form-card admin-toolbar">
        <div class="admin-toolbar__intro">
          <p class="profile-card__eyebrow">Bộ lọc</p>
          <h2>Lọc và tìm liên hệ</h2>
        </div>

        <div class="admin-toolbar__controls">
          <label class="form-field">
            <span class="label-text">Tìm nhanh liên hệ</span>
            <input type="search" placeholder="Tên, email, số điện thoại hoặc nội dung" data-admin-messages-search inputmode="search" autocomplete="off">
          </label>

          <label class="form-field">
            <span class="label-text">Trạng thái liên hệ</span>
            <select data-admin-messages-filter>
              <option value="">Tất cả liên hệ</option>
              <option value="RECEIVED">Mới nhận</option>
              <option value="IN_PROGRESS">Đang xử lý</option>
              <option value="RESOLVED">Đã giải quyết</option>
              <option value="CLOSED">Đã đóng</option>
            </select>
          </label>
        </div>
      </div>

      <div data-admin-messages-content></div>
    </div>
  </section>
</main>
