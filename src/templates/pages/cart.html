<main>
  <section class="section">
    <div class="container">
      <div class="cart-shell">
        <div class="cart-header">
          <div class="cart-header__copy">
            <p class="section-label">Checkout</p>
            <h1 class="cart-header__title">Giỏ hàng của bạn</h1>
          </div>
        </div>

        <div class="cart-layout">
          <div class="cart-panel">
            <div data-cart-items></div>
          </div>

          <aside class="cart-summary" aria-label="Tóm tắt đơn hàng">
            <div class="cart-summary__header">
              <p class="cart-summary__eyebrow">Tóm tắt thanh toán</p>
              <h2 class="cart-summary__title">Chọn cách hoàn tất đơn hàng</h2>
            </div>

            <div class="cart-summary__totals">
              <div class="summary-line">
                <span>Tổng thanh toán</span>
                <strong data-cart-total>0 đ</strong>
              </div>
            </div>

            <div data-checkout-panel></div>
          </aside>
        </div>
      </div>
    </div>
  </section>

  <div data-checkout-modal-root></div>
</main>
