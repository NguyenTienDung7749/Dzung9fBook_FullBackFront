<main>
  <section class="section">
    <div class="container admin-layout">
      <div class="section-heading section-heading--compact">
        <div>
          <p class="section-label">Admin / Đơn hàng</p>
          <h1 class="section-title">Quản lý đơn hàng</h1>
          <p class="section-text">Quét nhanh đơn mới và cập nhật trạng thái xử lý trong một màn hình gọn, dễ theo dõi hơn.</p>
        </div>

        <nav class="admin-subnav" aria-label="Điều hướng quản trị">
          <a href="./admin.html" class="admin-subnav__link">Hub</a>
          <a href="./admin-orders.html" class="admin-subnav__link is-active" aria-current="page">Đơn hàng</a>
          <a href="./admin-books.html" class="admin-subnav__link">Tồn kho</a>
          <a href="./admin-messages.html" class="admin-subnav__link">Tin nhắn</a>
        </nav>
      </div>

      <div class="form-card admin-toolbar">
        <div class="admin-toolbar__intro">
          <p class="profile-card__eyebrow">Bộ lọc</p>
          <h2>Lọc và tìm đơn hàng</h2>
        </div>

        <div class="admin-toolbar__controls">
          <label class="form-field">
            <span class="label-text">Tìm nhanh đơn hàng</span>
            <input type="search" placeholder="Mã đơn, tên, email hoặc số điện thoại" data-admin-orders-search inputmode="search" autocomplete="off">
          </label>

          <label class="form-field">
            <span class="label-text">Trạng thái đơn hàng</span>
            <select data-admin-orders-filter>
              <option value="">Tất cả đơn hàng</option>
              <option value="PENDING_CONFIRMATION">Chờ xác nhận</option>
              <option value="CONFIRMED">Đã xác nhận</option>
              <option value="CANCELLED">Đã hủy</option>
              <option value="COMPLETED">Hoàn tất</option>
            </select>
          </label>
        </div>
      </div>

      <div data-admin-orders-content></div>
    </div>
  </section>
</main>
