<main>
  <section class="section">
    <div class="container admin-layout">
      <div class="section-heading section-heading--compact">
        <div>
          <p class="section-label">Admin / Don hang</p>
          <h1 class="section-title">Quan ly don hang</h1>
          <p class="section-text">Theo doi nhanh cac don COD moi tao va cap nhat trang thai xu ly ngay tren trang.</p>
        </div>

        <div class="empty-state__actions">
          <a href="./admin-books.html" class="btn btn-secondary">Ton kho sach</a>
          <a href="./admin-messages.html" class="btn btn-secondary">Tin nhan lien he</a>
        </div>
      </div>

      <div class="form-card admin-toolbar">
        <div>
          <p class="profile-card__eyebrow">Bo loc</p>
          <h2>Danh sach don hang</h2>
          <p>Loc theo trang thai don de staff/admin xu ly nhanh hon trong luc demo va van hanh thu.</p>
        </div>

        <div class="admin-toolbar__controls">
          <label class="form-field">
            <span class="label-text">Tim nhanh don hang</span>
            <input type="search" placeholder="Ma don, ten, email hoac so dien thoai" data-admin-orders-search inputmode="search" autocomplete="off">
          </label>

          <label class="form-field">
            <span class="label-text">Trang thai don hang</span>
            <select data-admin-orders-filter>
              <option value="">Tat ca don hang</option>
              <option value="PENDING_CONFIRMATION">Cho xac nhan</option>
              <option value="CONFIRMED">Da xac nhan</option>
              <option value="CANCELLED">Da huy</option>
              <option value="COMPLETED">Hoan tat</option>
            </select>
          </label>
        </div>
      </div>

      <div data-admin-orders-content></div>
    </div>
  </section>
</main>
